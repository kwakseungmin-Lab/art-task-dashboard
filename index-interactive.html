<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Task Plan Pipeline Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1419;
            color: #e1e8ed;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0a0e1a;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e1e8ed;
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        /* Main Content */
        .main-container {
            margin-left: 280px;
            flex: 1;
            padding: 32px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
        }

        /* Tabs */
        .tab-container {
            display: flex;
            gap: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }

        /* Content Area */
        #main-content {
            min-height: 400px;
        }

        #tab-content {
            min-height: 200px;
        }

        /* Glass Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        /* Neu Card */
        .neu-card {
            background: linear-gradient(145deg, #1a1f2e, #0f1419);
            border-radius: 12px;
            padding: 20px;
            box-shadow:
                8px 8px 16px rgba(0, 0, 0, 0.4),
                -8px -8px 16px rgba(255, 255, 255, 0.02);
        }

        /* Modern Button */
        .btn-modern {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }

        /* Loading State */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-container {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo">Art Task Pipeline</div>

        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <div class="nav-item active" data-view="overview">
                <span>📊 Overview</span>
            </div>
            <div class="nav-item" data-view="iterations">
                <span>🔄 Iterations</span>
            </div>
            <div class="nav-item" data-view="agents">
                <span>🤖 Agents</span>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Data</div>
            <div class="nav-item" data-view="knowledge-base">
                <span>📚 Knowledge Base</span>
            </div>
            <div class="nav-item" data-view="s3-browser">
                <span>☁️ S3 Repository</span>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Analysis</div>
            <div class="nav-item" data-view="analytics">
                <span>📈 Analytics</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="header">
            <h1>Art Task Plan Dashboard</h1>
            <p>Multi-Agent Pipeline Management System</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-container">
            <button class="tab active" data-tab="pipeline">Pipeline Flow</button>
            <button class="tab" data-tab="metrics">Metrics</button>
            <button class="tab" data-tab="logs">Logs</button>
        </div>

        <!-- Tab Content -->
        <div id="tab-content">
            <div class="loading-spinner"></div>
        </div>

        <!-- Main Content Area -->
        <div id="main-content">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Dashboard Application -->
    <script src="dashboard-app.js"></script>
</body>
</html>
