<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Task Plan Pipeline - Real Data Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="dashboard-real.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1419;
            color: #e1e8ed;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0a0e1a;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e1e8ed;
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        /* Main Content */
        .main-container {
            margin-left: 280px;
            flex: 1;
            padding: 32px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
        }

        /* Content Area */
        #main-content {
            min-height: 400px;
        }

        /* Glass Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        /* Modern Button */
        .btn-modern {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-modern.small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #1a1f2e;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .modal-content.large {
            max-width: 1200px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h2 {
            color: #e1e8ed;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #f87171;
        }

        .modal-body {
            padding: 24px;
        }

        /* Code Block */
        .code-block {
            background: #0a0e1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            color: #10b981;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre;
        }

        /* Overview Grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .stat-card h3 {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #e1e8ed;
            margin-bottom: 8px;
        }

        .stat-change {
            color: #10b981;
            font-size: 14px;
        }

        /* Iterations Grid */
        .iterations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .iteration-card {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .iteration-card:hover {
            transform: translateY(-4px);
        }

        .iteration-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .iteration-header h3 {
            color: #e1e8ed;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-badge.complete {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.in-progress {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .iteration-info p {
            margin-bottom: 4px;
            color: #94a3b8;
        }

        .iteration-info strong {
            color: #e1e8ed;
        }

        /* KB Stats */
        .kb-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
        }

        .kb-stats {
            display: flex;
            gap: 32px;
        }

        .kb-stats .stat {
            display: flex;
            flex-direction: column;
        }

        .kb-stats .label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .kb-stats .value {
            color: #e1e8ed;
            font-size: 24px;
            font-weight: 700;
        }

        /* KB Category Card */
        .kb-category-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 24px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .category-header h3 {
            color: #e1e8ed;
        }

        .entity-count {
            color: #3b82f6;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-container {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo">Art Task Pipeline</div>

        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <div class="nav-item active" data-view="overview">
                <span>📊 Overview</span>
            </div>
            <div class="nav-item" data-view="iterations">
                <span>🔄 All Iterations (1-8)</span>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Knowledge Base</div>
            <div class="nav-item" data-view="art-kb">
                <span>🎯 Art Task Plan KB</span>
            </div>
            <div class="nav-item" data-view="meta-kb">
                <span>⚙️ Meta Iteration KB</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="header">
            <h1>Art Task Plan Pipeline</h1>
            <p>Real Multi-Agent Pipeline Data Dashboard</p>
        </div>

        <!-- Main Content Area -->
        <div id="main-content">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Real Dashboard Application -->
    <script src="dashboard-real-data.js"></script>
</body>
</html>
