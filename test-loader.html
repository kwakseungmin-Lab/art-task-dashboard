<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test JSON Loader</title>
    <style>
        body {
            font-family: monospace;
            background: #0f1419;
            color: #e1e8ed;
            padding: 20px;
        }
        pre {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 5px;
            overflow: auto;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        button {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <h1>JSON Loader Test</h1>
    <div>
        <button onclick="testLoad('_project_common.json')">Load _project_common.json</button>
        <button onclick="testLoad('character/dino_runner_core.json')">Load dino_runner_core.json</button>
        <button onclick="testLoad('ui/score_digits_font.json')">Load score_digits_font.json</button>
        <button onclick="testLoad('world/sky_day_field.json')">Load sky_day_field.json</button>
    </div>
    <div id="status"></div>
    <pre id="result"></pre>

    <script src="fixed-json-loader.js"></script>
    <script src="dynamic-json-loader.js"></script>
    <script>
        async function testLoad(fileName) {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            statusDiv.innerHTML = '<span class="status">Loading ' + fileName + '...</span>';
            resultDiv.textContent = '';

            try {
                // Test FixedJSONLoader
                const data = await FixedJSONLoader.loadJSON(8, 'Chrome_Dino_Runner', 1, fileName);

                if (data.error) {
                    statusDiv.innerHTML = '<span class="error">❌ Error: ' + data.error + ' - ' + (data.message || data.path) + '</span>';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    statusDiv.innerHTML = '<span class="success">✅ Successfully loaded ' + fileName + '</span>';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                statusDiv.innerHTML = '<span class="error">❌ Exception: ' + error.message + '</span>';
                resultDiv.textContent = error.stack;
            }
        }

        // Test on load
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Test page loaded');
            console.log('GitHub Pages:', FixedJSONLoader.isGitHubPages());
            console.log('Base path:', FixedJSONLoader.getBasePath());

            // Auto-test after 2 seconds
            setTimeout(() => {
                testLoad('_project_common.json');
            }, 2000);
        });
    </script>
</body>
</html>
