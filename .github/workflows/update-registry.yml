name: Update Art Task Registry

on:
  schedule:
    # Run every day at 09:00 AM KST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'scripts/collect_art_task_data.py'
      - '.github/workflows/update-registry.yml'

jobs:
  update-registry:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests boto3 pyyaml

    - name: Collect Art Task Plan data
      env:
        AZLE_API_TOKEN: ${{ secrets.AZLE_API_TOKEN }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ap-northeast-2
      run: |
        python scripts/collect_art_task_data.py

    - name: Update KB statistics
      run: |
        python scripts/update_kb_stats.py

    - name: Generate Registry entries
      run: |
        python scripts/generate_registry.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add -A
        if git diff-index --quiet HEAD; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Auto-update: Registry and KB statistics [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        fi